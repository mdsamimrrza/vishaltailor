name: PR Check

"on":
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm run typecheck

      - name: Build frontend
        id: build
        continue-on-error: true
        run: pnpm run build:frontend

      - name: Comment PR summary
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const typecheckStatus = '${{ steps.typecheck.outcome }}';
            const buildStatus = '${{ steps.build.outcome }}';
            const body = [
              '## Build Summary',
              '',
              `- TypeScript: ${typecheckStatus === 'success' ? '✅ Passed' : '❌ Failed'}`,
              `- Frontend build: ${buildStatus === 'success' ? '✅ Passed' : '❌ Failed'}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail when checks fail
        if: ${{ steps.typecheck.outcome != 'success' || steps.build.outcome != 'success' }}
        run: exit 1

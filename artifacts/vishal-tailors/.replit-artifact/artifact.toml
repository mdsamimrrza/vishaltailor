kind = "web"
previewPath = "/"
title = "New Vishal Tailors"
version = "1.0.0"
id = "artifacts/vishal-tailors"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26170

[services.development]
run = "pnpm --filter @workspace/vishal-tailors run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vishal-tailors", "run", "build" ]
publicDir = "artifacts/vishal-tailors/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26170"
BASE_PATH = "/"

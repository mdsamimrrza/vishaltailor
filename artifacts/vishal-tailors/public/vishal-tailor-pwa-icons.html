<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vishal Tailor – PWA Icons</title>
<style>
  body { margin: 0; background: #f8fafc; font-family: sans-serif; padding: 32px; }
  h2 { color: #334155; font-size: 15px; font-weight: 500; margin: 0 0 20px; }
  .row { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 32px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item span { font-size: 11px; color: #94a3b8; }
  canvas { border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .download-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
  button {
    padding: 8px 18px; border: none; border-radius: 8px;
    background: #0f172a; color: #fff; font-size: 13px;
    cursor: pointer; font-family: sans-serif;
  }
  button:hover { background: #1e293b; }
  .note { font-size: 12px; color: #94a3b8; margin-top: 24px; line-height: 1.6; }
  code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
</style>
</head>
<body>

<h2>Vishal Tailor — PWA Icon Generator</h2>

<div class="row" id="previews"></div>

<div class="download-row" id="buttons"></div>

<p class="note">
  Add these to your <code>manifest.json</code>:<br><br>
  <code>"icons": [<br>
  &nbsp;&nbsp;{ "src": "icon-192.png", "sizes": "192x192", "type": "image/png" },<br>
  &nbsp;&nbsp;{ "src": "icon-512.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }<br>
  ]</code>
</p>

<script>
const SIZES = [16, 32, 64, 192, 512];

function drawIcon(ctx, S) {
  const s = S / 64;

  // Background
  const r = 14 * s;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(S - r, 0);
  ctx.quadraticCurveTo(S, 0, S, r);
  ctx.lineTo(S, S - r);
  ctx.quadraticCurveTo(S, S, S - r, S);
  ctx.lineTo(r, S);
  ctx.quadraticCurveTo(0, S, 0, S - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0f172a';
  ctx.fill();

  // Top highlight
  ctx.save();
  ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.035)';
  ctx.fillRect(0, 0, S, 7 * s);
  ctx.restore();

  // V polygon
  // Original points at 64px: 9,11 21,11 32,39 43,11 55,11 35,53 29,53
  const pts = [[9,11],[21,11],[32,39],[43,11],[55,11],[35,53],[29,53]];
  ctx.beginPath();
  ctx.moveTo(pts[0][0]*s, pts[0][1]*s);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0]*s, pts[i][1]*s);
  ctx.closePath();
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Glow arc
  ctx.beginPath();
  ctx.moveTo(15*s, 45*s);
  ctx.quadraticCurveTo(32*s, 34*s, 49*s, 45*s);
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 4 * s;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.25;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Main thread arc
  ctx.beginPath();
  ctx.moveTo(15*s, 45*s);
  ctx.quadraticCurveTo(32*s, 34*s, 49*s, 45*s);
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2 * s;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Needle circle
  ctx.beginPath();
  ctx.arc(49.5*s, 45*s, 2.2*s, 0, Math.PI*2);
  ctx.fillStyle = '#22c55e';
  ctx.fill();

  // Needle eye ring
  ctx.beginPath();
  ctx.arc(49.5*s, 45*s, 3.8*s, 0, Math.PI*2);
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 0.9 * s;
  ctx.globalAlpha = 0.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

const previews = document.getElementById('previews');
const buttons = document.getElementById('buttons');

SIZES.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const displaySize = Math.min(size, 128);
  canvas.style.width = displaySize + 'px';
  canvas.style.height = displaySize + 'px';
  const ctx = canvas.getContext('2d');
  drawIcon(ctx, size);

  const item = document.createElement('div');
  item.className = 'item';
  const label = document.createElement('span');
  label.textContent = size + ' × ' + size;
  item.appendChild(canvas);
  item.appendChild(label);
  previews.appendChild(item);

  if ([192, 512].includes(size)) {
    const btn = document.createElement('button');
    btn.textContent = '↓ Download icon-' + size + '.png';
    btn.onclick = () => {
      const link = document.createElement('a');
      link.download = 'icon-' + size + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };
    buttons.appendChild(btn);
  }
});

// Also offer SVG download
const svgBtn = document.createElement('button');
svgBtn.textContent = '↓ Download favicon.svg';
svgBtn.style.background = '#166534';
svgBtn.onclick = () => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <rect x="0" y="0" width="64" height="7" rx="5" fill="#ffffff" opacity="0.035"/>
  <polygon points="9,11 21,11 32,39 43,11 55,11 35,53 29,53" fill="#ffffff"/>
  <path d="M15 45 Q32 34, 49 45" stroke="#4ade80" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M15 45 Q32 34, 49 45" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="49.5" cy="45" r="2.2" fill="#22c55e"/>
  <circle cx="49.5" cy="45" r="3.8" fill="none" stroke="#22c55e" stroke-width="0.9" opacity="0.5"/>
</svg>`;
  const blob = new Blob([svg], {type: 'image/svg+xml'});
  const link = document.createElement('a');
  link.download = 'favicon.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
};
buttons.appendChild(svgBtn);
</script>
</body>
</html>

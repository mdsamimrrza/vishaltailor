<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: deep navy rounded square -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Subtle top highlight for depth -->
  <rect x="1" y="1" width="62" height="8" rx="7" fill="#ffffff" opacity="0.04"/>

  <!-- V letterform: two precise diagonal strokes, geometric & bold -->
  <polygon
    points="12,13 22,13 32,44 42,13 52,13 34,52 30,52"
    fill="#ffffff"
  />

  <!-- Thread arc: graceful curve below the V tip — tailor's craft motif -->
  <!-- Soft glow layer -->
  <path
    d="M18 51 Q32 40, 46 51"
    stroke="#4ade80"
    stroke-width="3.5"
    fill="none"
    stroke-linecap="round"
    opacity="0.22"
  />
  <!-- Main thread -->
  <path
    d="M18 51 Q32 40, 46 51"
    stroke="#22c55e"
    stroke-width="1.8"
    fill="none"
    stroke-linecap="round"
  />

  <!-- Needle at arc end (rotated 45°, positioned at right terminus) -->
  <line
    x1="46" y1="51"
    x2="49.5" y2="54.5"
    stroke="#22c55e"
    stroke-width="1.2"
    stroke-linecap="round"
  />
  <!-- Needle eye (tiny oval) -->
  <ellipse
    cx="49.5" cy="54.5"
    rx="2.2" ry="1.2"
    fill="none"
    stroke="#22c55e"
    stroke-width="0.9"
    transform="rotate(-45 49.5 54.5)"
  />

  <!-- Stitch dots along bottom edge — subtle brand detail -->
  <circle cx="20" cy="58.5" r="0.9" fill="#334155"/>
  <circle cx="25" cy="59.2" r="0.9" fill="#334155"/>
  <circle cx="30" cy="59.5" r="0.9" fill="#334155"/>
  <circle cx="35" cy="59.2" r="0.9" fill="#334155"/>
  <circle cx="40" cy="58.5" r="0.9" fill="#334155"/>
</svg>

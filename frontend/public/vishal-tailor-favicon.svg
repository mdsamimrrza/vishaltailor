<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Top highlight -->
  <rect x="0" y="0" width="64" height="7" rx="5" fill="#ffffff" opacity="0.035"/>

  <!-- V — pure polygon, bold & geometric, no font rendering -->
  <polygon
    points="9,11 21,11 32,39 43,11 55,11 35,53 29,53"
    fill="#ffffff"
  />

  <!-- Thread arc: curves UP (needle-lift motion), sits just below V tip -->
  <!-- Glow -->
  <path d="M15 45 Q32 34, 49 45"
    stroke="#4ade80" stroke-width="4" fill="none"
    stroke-linecap="round" opacity="0.25"/>
  <!-- Main thread -->
  <path d="M15 45 Q32 34, 49 45"
    stroke="#22c55e" stroke-width="2" fill="none"
    stroke-linecap="round"/>

  <!-- Needle head at right end -->
  <circle cx="49.5" cy="45" r="2.2" fill="#22c55e"/>
  <!-- Needle eye ring -->
  <circle cx="49.5" cy="45" r="3.8" fill="none"
    stroke="#22c55e" stroke-width="0.9" opacity="0.5"/>
</svg>
